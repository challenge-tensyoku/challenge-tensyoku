<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 420" width="320" height="420">
  <!-- BG (night sky, stargazing) -->
  <rect width="320" height="420" fill="#0a0f28" rx="24"/>
  <!-- Stars scattered -->
  <circle cx="30" cy="30" r="2" fill="white" opacity="0.9"/>
  <circle cx="60" cy="18" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="100" cy="40" r="2.5" fill="white" opacity="0.8"/>
  <circle cx="140" cy="20" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="180" cy="35" r="2" fill="white" opacity="0.9"/>
  <circle cx="220" cy="15" r="2.5" fill="white" opacity="0.8"/>
  <circle cx="265" cy="30" r="2" fill="white" opacity="0.7"/>
  <circle cx="290" cy="50" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="50" cy="60" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="300" cy="80" r="2" fill="white" opacity="0.7"/>
  <circle cx="14" cy="80" r="1.5" fill="white" opacity="0.6"/>
  <!-- Star twinkles (4-point) -->
  <text x="248" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#FFD600" opacity="0.9">✦</text>
  <text x="78" y="44" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#FFD600" opacity="0.7">✦</text>
  <text x="308" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="white" opacity="0.8">✦</text>

  <!-- Telescope -->
  <!-- Tripod legs -->
  <line x1="200" y1="330" x2="170" y2="390" stroke="#8B6348" stroke-width="4" stroke-linecap="round"/>
  <line x1="200" y1="330" x2="230" y2="390" stroke="#8B6348" stroke-width="4" stroke-linecap="round"/>
  <line x1="200" y1="330" x2="200" y2="395" stroke="#8B6348" stroke-width="4" stroke-linecap="round"/>
  <!-- Tripod joint -->
  <circle cx="200" cy="330" r="8" fill="#6b4a28" stroke="#4a2a10" stroke-width="2"/>
  <!-- Telescope tube -->
  <rect x="148" y="270" width="100" height="28" rx="14" fill="#4a5a6a" stroke="#2a3a4a" stroke-width="2.5" transform="rotate(-25,198,284)"/>
  <!-- Telescope wide end -->
  <ellipse cx="162" cy="300" rx="20" ry="14" fill="#3a4a5a" stroke="#2a3a4a" stroke-width="2" transform="rotate(-25,162,300)"/>
  <!-- Telescope eyepiece -->
  <ellipse cx="248" cy="272" rx="10" ry="7" fill="#5a6a7a" stroke="#2a3a4a" stroke-width="2" transform="rotate(-25,248,272)"/>
  <!-- Viewfinder glow -->
  <circle cx="244" cy="268" r="5" fill="#4d9fff" opacity="0.6"/>

  <!-- Giraffe body -->
  <!-- Legs (4 long legs) -->
  <rect x="104" y="328" width="22" height="64" rx="10" fill="#E8C050" stroke="#b89030" stroke-width="2"/>
  <rect x="136" y="328" width="22" height="64" rx="10" fill="#E8C050" stroke="#b89030" stroke-width="2"/>
  <!-- Brown spots on legs -->
  <ellipse cx="113" cy="345" rx="7" ry="5" fill="#8B5C2A" opacity="0.7"/>
  <ellipse cx="144" cy="360" rx="6" ry="5" fill="#8B5C2A" opacity="0.7"/>

  <!-- Giraffe body torso -->
  <ellipse cx="140" cy="308" rx="60" ry="40" fill="#E8C050" stroke="#b89030" stroke-width="2.5"/>
  <!-- Body spots -->
  <ellipse cx="118" cy="296" rx="14" ry="10" fill="#8B5C2A" opacity="0.6" transform="rotate(-15,118,296)"/>
  <ellipse cx="152" cy="288" rx="12" ry="8" fill="#8B5C2A" opacity="0.6" transform="rotate(10,152,288)"/>
  <ellipse cx="164" cy="316" rx="10" ry="8" fill="#8B5C2A" opacity="0.6"/>
  <ellipse cx="128" cy="322" rx="8" ry="6" fill="#8B5C2A" opacity="0.6" transform="rotate(-20,128,322)"/>

  <!-- Arms (one extended toward telescope) -->
  <!-- Left arm (holding telescope area) -->
  <rect x="80" y="286" width="22" height="48" rx="11" fill="#E8C050" stroke="#b89030" stroke-width="2" transform="rotate(15,91,310)"/>

  <!-- Long neck -->
  <rect x="130" y="188" width="36" height="132" rx="18" fill="#E8C050" stroke="#b89030" stroke-width="2.5"/>
  <!-- Neck spots -->
  <ellipse cx="140" cy="210" rx="10" ry="8" fill="#8B5C2A" opacity="0.6"/>
  <ellipse cx="156" cy="238" rx="9" ry="7" fill="#8B5C2A" opacity="0.6" transform="rotate(10,156,238)"/>
  <ellipse cx="138" cy="264" rx="10" ry="7" fill="#8B5C2A" opacity="0.6"/>

  <!-- Giraffe head (looking up at sky through telescope) -->
  <ellipse cx="148" cy="170" rx="42" ry="36" fill="#E8C050" stroke="#b89030" stroke-width="2.5"/>
  <!-- Head spots -->
  <ellipse cx="136" cy="158" rx="10" ry="7" fill="#8B5C2A" opacity="0.5"/>
  <ellipse cx="162" cy="175" rx="8" ry="6" fill="#8B5C2A" opacity="0.5"/>
  <!-- Ossicones (horns) -->
  <rect x="130" y="134" width="8" height="22" rx="4" fill="#b89030"/>
  <circle cx="134" cy="133" r="5" fill="#8B5C2A"/>
  <rect x="152" y="132" width="8" height="24" rx="4" fill="#b89030"/>
  <circle cx="156" cy="131" r="5" fill="#8B5C2A"/>
  <!-- Ears -->
  <ellipse cx="108" cy="166" rx="14" ry="8" fill="#E8C050" stroke="#b89030" stroke-width="2" transform="rotate(-40,108,166)"/>
  <ellipse cx="188" cy="166" rx="14" ry="8" fill="#E8C050" stroke="#b89030" stroke-width="2" transform="rotate(40,188,166)"/>
  <!-- Snout -->
  <ellipse cx="148" cy="186" rx="22" ry="14" fill="#d4a840"/>
  <!-- Nostrils -->
  <ellipse cx="140" cy="189" rx="4" ry="3" fill="#b89030"/>
  <ellipse cx="156" cy="189" rx="4" ry="3" fill="#b89030"/>
  <!-- Eyes (looking up, filled with wonder) -->
  <circle cx="130" cy="164" r="10" fill="white" stroke="#8B5C2A" stroke-width="2"/>
  <circle cx="166" cy="164" r="10" fill="white" stroke="#8B5C2A" stroke-width="2"/>
  <!-- Pupils looking upward -->
  <circle cx="129" cy="161" r="6" fill="#2a1a08"/>
  <circle cx="165" cy="161" r="6" fill="#2a1a08"/>
  <circle cx="131" cy="159" r="2" fill="white"/>
  <circle cx="167" cy="159" r="2" fill="white"/>
  <!-- Smile (in awe) -->
  <path d="M 136 194 Q 148 202 160 194" stroke="#8B5C2A" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Vision beam from telescope toward sky (dotted) -->
  <line x1="156" y1="292" x2="118" y2="148" stroke="#4d9fff" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- Shooting star -->
  <line x1="280" y1="60" x2="230" y2="100" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <circle cx="280" cy="60" r="4" fill="#FFD600"/>

  <!-- Name badge -->
  <rect x="36" y="388" width="248" height="26" rx="13" fill="#2a3a6a"/>
  <text x="160" y="406" text-anchor="middle" font-family="Hiragino Kaku Gothic Pro,Noto Sans JP,sans-serif" font-size="13" font-weight="bold" fill="white">ビジョナリーキリン</text>
</svg>
