<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 420" width="320" height="420">

  <!-- Background -->
  <rect width="320" height="420" fill="#F7F3EE" rx="24"/>

  <!-- ===== SOFA ===== -->
  <!-- Sofa legs -->
  <rect x="46" y="383" width="16" height="26" rx="5" fill="#A89478" stroke="#272727" stroke-width="2.5"/>
  <rect x="258" y="383" width="16" height="26" rx="5" fill="#A89478" stroke="#272727" stroke-width="2.5"/>

  <!-- Sofa back -->
  <rect x="20" y="232" width="280" height="104" rx="20" fill="#C9B49A" stroke="#272727" stroke-width="3"/>
  <!-- Sofa back cushion left -->
  <rect x="28" y="242" width="128" height="86" rx="14" fill="#D4BFA6" stroke="#272727" stroke-width="2"/>
  <!-- Sofa back cushion right -->
  <rect x="164" y="242" width="128" height="86" rx="14" fill="#D4BFA6" stroke="#272727" stroke-width="2"/>

  <!-- Sofa seat -->
  <rect x="20" y="322" width="280" height="76" rx="20" fill="#DDD0BC" stroke="#272727" stroke-width="3"/>

  <!-- Left armrest -->
  <rect x="8" y="256" width="52" height="128" rx="16" fill="#C9B49A" stroke="#272727" stroke-width="3"/>
  <!-- Right armrest -->
  <rect x="260" y="256" width="52" height="128" rx="16" fill="#C9B49A" stroke="#272727" stroke-width="3"/>

  <!-- ===== PANDA ===== -->

  <!-- Left arm (holding snack, resting on left armrest) -->
  <ellipse cx="84" cy="320" rx="36" ry="19" fill="#909090" stroke="#272727" stroke-width="3" transform="rotate(-15 84 320)"/>
  <!-- Left paw -->
  <ellipse cx="50" cy="348" rx="24" ry="17" fill="#F5F0E8" stroke="#272727" stroke-width="2.5"/>
  <circle cx="40" cy="340" r="7" fill="#F5F0E8" stroke="#272727" stroke-width="2.5"/>
  <circle cx="51" cy="336" r="7" fill="#F5F0E8" stroke="#272727" stroke-width="2.5"/>
  <circle cx="62" cy="340" r="7" fill="#F5F0E8" stroke="#272727" stroke-width="2.5"/>

  <!-- Right arm (resting on right armrest) -->
  <ellipse cx="236" cy="320" rx="36" ry="19" fill="#909090" stroke="#272727" stroke-width="3" transform="rotate(15 236 320)"/>
  <!-- Right paw -->
  <ellipse cx="270" cy="348" rx="24" ry="17" fill="#F5F0E8" stroke="#272727" stroke-width="2.5"/>
  <circle cx="258" cy="340" r="7" fill="#F5F0E8" stroke="#272727" stroke-width="2.5"/>
  <circle cx="269" cy="336" r="7" fill="#F5F0E8" stroke="#272727" stroke-width="2.5"/>
  <circle cx="280" cy="340" r="7" fill="#F5F0E8" stroke="#272727" stroke-width="2.5"/>

  <!-- Body (grey hoodie) -->
  <ellipse cx="160" cy="318" rx="80" ry="70" fill="#909090" stroke="#272727" stroke-width="3.5"/>
  <!-- Hoodie center seam -->
  <line x1="160" y1="262" x2="160" y2="372" stroke="#272727" stroke-width="1.5" opacity="0.25"/>
  <!-- Hoodie front pocket -->
  <path d="M 126 348 Q 160 360 194 348 L 194 376 Q 160 386 126 376 Z"
        fill="#787878" stroke="#272727" stroke-width="2.5"/>

  <!-- Snack bag on left paw -->
  <g transform="translate(18 288) rotate(-12 34 44)">
    <!-- Bag top seal -->
    <rect x="4" y="18" width="56" height="15" rx="7" fill="#E8941A" stroke="#272727" stroke-width="2.5"/>
    <!-- Bag body -->
    <rect x="8" y="30" width="48" height="62" rx="9" fill="#F5A623" stroke="#272727" stroke-width="2.5"/>
    <!-- Label -->
    <rect x="14" y="38" width="36" height="42" rx="5" fill="#FBD26A"/>
    <!-- Snack dots -->
    <circle cx="24" cy="50" r="5" fill="#F5A623" opacity="0.65"/>
    <circle cx="36" cy="45" r="5" fill="#F5A623" opacity="0.65"/>
    <circle cx="42" cy="58" r="5" fill="#F5A623" opacity="0.65"/>
    <circle cx="28" cy="63" r="4" fill="#F5A623" opacity="0.65"/>
  </g>

  <!-- Panda ears (behind head) -->
  <circle cx="120" cy="140" r="27" fill="#272727"/>
  <circle cx="200" cy="140" r="27" fill="#272727"/>
  <circle cx="120" cy="140" r="14" fill="#383838"/>
  <circle cx="200" cy="140" r="14" fill="#383838"/>

  <!-- Panda head -->
  <circle cx="160" cy="186" r="68" fill="#F8F6F2" stroke="#272727" stroke-width="3.5"/>

  <!-- Eye patches -->
  <ellipse cx="137" cy="182" rx="23" ry="21" fill="#272727" transform="rotate(-10 137 182)"/>
  <ellipse cx="183" cy="182" rx="23" ry="21" fill="#272727" transform="rotate(10 183 182)"/>

  <!-- Sleepy eyes (heavy eyelids) -->
  <!-- Left eye white -->
  <ellipse cx="137" cy="182" rx="12" ry="9" fill="#F8F6F2"/>
  <!-- Left eyelid covering top half -->
  <ellipse cx="137" cy="178" rx="12" ry="8" fill="#272727"/>
  <!-- Left pupil -->
  <circle cx="137" cy="186" r="6" fill="#272727"/>
  <circle cx="133" cy="182" r="3" fill="white"/>
  <!-- Right eye white -->
  <ellipse cx="183" cy="182" rx="12" ry="9" fill="#F8F6F2"/>
  <!-- Right eyelid -->
  <ellipse cx="183" cy="178" rx="12" ry="8" fill="#272727"/>
  <!-- Right pupil -->
  <circle cx="183" cy="186" r="6" fill="#272727"/>
  <circle cx="179" cy="182" r="3" fill="white"/>

  <!-- Nose -->
  <ellipse cx="160" cy="204" rx="13" ry="9" fill="#272727"/>
  <ellipse cx="156" cy="201" rx="4" ry="3" fill="#3C3C3C"/>

  <!-- Lazy mouth -->
  <path d="M 150 216 Q 160 224 170 216" stroke="#272727" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="116" cy="206" rx="19" ry="12" fill="#F2A0A0" opacity="0.5"/>
  <ellipse cx="204" cy="206" rx="19" ry="12" fill="#F2A0A0" opacity="0.5"/>

  <!-- ===== ZZZ ===== -->
  <text x="236" y="162" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="17" fill="#7AAED8" opacity="0.75">z</text>
  <text x="256" y="132" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="25" fill="#7AAED8" opacity="0.85">z</text>
  <text x="278" y="94" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="36" fill="#7AAED8" opacity="0.9">Z</text>

  <!-- Name badge -->
  <rect x="58" y="390" width="204" height="24" rx="12" fill="#272727"/>
  <text x="160" y="407" text-anchor="middle"
        font-family="'Hiragino Kaku Gothic Pro','Noto Sans JP','Meiryo',sans-serif"
        font-size="13" font-weight="bold" fill="white">ニートパンダ</text>

</svg>
